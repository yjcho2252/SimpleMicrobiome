<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-label="SimpleMicrobiome analysis modules">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c92"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <style>
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f3568; }
      .subtitle { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #355074; }
      .label { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #ffffff; text-anchor: middle; }
      .icon { stroke: #e8f4ff; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #fef08a; }
    </style>
  </defs>

  <rect x="1" y="1" width="978" height="258" rx="16" fill="url(#bg)" stroke="#cfe0f5"/>
  <text x="30" y="44" class="title">Analysis Modules</text>
  <text x="30" y="68" class="subtitle">Choose one or more modules based on your analysis goal.</text>

  <g transform="translate(40,94)">
    <rect width="210" height="130" rx="16" fill="url(#card)"/>
    <path d="M44 86l30-24 24 16 30-34" class="icon"/>
    <circle cx="44" cy="86" r="3" class="dot"/>
    <circle cx="74" cy="62" r="3" class="dot"/>
    <circle cx="98" cy="78" r="3" class="dot"/>
    <circle cx="128" cy="44" r="3" class="dot"/>
    <text x="105" y="114" class="label">Visualization</text>
  </g>

  <g transform="translate(275,94)">
    <rect width="210" height="130" rx="16" fill="url(#card)"/>
    <circle cx="105" cy="68" r="28" class="icon"/>
    <path d="M105 40v56M77 68h56" class="icon"/>
    <text x="105" y="114" class="label">Diversity Analysis</text>
  </g>

  <g transform="translate(510,94)">
    <rect width="210" height="130" rx="16" fill="url(#card)"/>
    <path d="M52 88V58M78 88V46M104 88V64M130 88V52M156 88V70" class="icon"/>
    <text x="105" y="114" class="label">Differential Abundance</text>
  </g>

  <g transform="translate(745,94)">
    <rect width="190" height="130" rx="16" fill="url(#card)"/>
    <circle cx="52" cy="56" r="6" class="dot"/>
    <circle cx="95" cy="42" r="6" class="dot"/>
    <circle cx="138" cy="58" r="6" class="dot"/>
    <circle cx="95" cy="84" r="6" class="dot"/>
    <path d="M52 56L95 42L138 58L95 84Z" class="icon"/>
    <path d="M52 56L95 84M95 42L95 84" class="icon"/>
    <text x="95" y="114" class="label">Network Analysis</text>
  </g>
</svg>